    - assets/images/candies/glossydrop.png
    - assets/images/candies/leaf.png
    - assets/images/candies/orange.png
    - assets/images/candies/pack candy.png
    - assets/images/candies/purple drop.png
    - assets/images/candies/purple jelly.png
